<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <a href="#calendar-main" class="skip-link">Skip to calendar</a>
  <div id="live-region" aria-live="polite" aria-atomic="true" class="sr-only"></div>

  <div class="page-wrapper">
    <h1 class="page-title">My Calendar</h1>

    <div class="cal-container">
      <div class="cal-nav">
        <button id="btn-prev" class="nav-btn" aria-label="Previous month">&#8249;</button>
        <h2 id="month-title"></h2>
        <button id="btn-next" class="nav-btn" aria-label="Next month">&#8250;</button>
      </div>

      <div class="cal-actions">
        <button id="btn-today">Today</button>
        <button id="btn-add-event">Add Event</button>
      </div>

      <main id="calendar-main">
        <div id="calendar-grid"></div>
      </main>
    </div>
  </div>

  <div id="event-modal" class="modal-overlay" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 id="modal-title">Add Event</h2>
        <button id="btn-modal-close" class="btn-close" aria-label="Close">&times;</button>
      </div>

      <form id="event-form" novalidate>
        <div class="form-group">
          <label for="input-title" class="sr-only">Event title (required)</label>
          <input id="input-title" type="text" placeholder="Add title" autocomplete="off"
                 class="input-title-large" aria-required="true" aria-describedby="err-title" />
          <span class="field-error" id="err-title" role="alert"></span>
        </div>

        <div class="form-group">
          <label for="input-date">Date <span class="required" aria-hidden="true">*</span></label>
          <input id="input-date" type="date" aria-required="true" aria-describedby="err-date" />
          <span class="field-error" id="err-date" role="alert"></span>
        </div>

        <div class="form-group form-group--inline">
          <div>
            <label for="input-start">Start time</label>
            <input id="input-start" type="time" />
          </div>
          <div>
            <label for="input-end">End time</label>
            <input id="input-end" type="time" />
          </div>
        </div>
        <span class="field-error" id="err-time" role="alert"></span>

        <div class="form-group">
          <label for="input-notes">Notes</label>
          <textarea id="input-notes" rows="2" placeholder="Add description"></textarea>
        </div>

        <div class="form-group">
          <label>Color</label>
          <div class="color-swatches" id="color-swatches"></div>
          <input type="hidden" id="input-color" value="#5c6bc0" />
        </div>

        <div class="modal-actions">
          <button type="button" id="btn-delete-event" class="btn-text-danger" hidden>Delete</button>
          <div class="modal-actions-right">
            <button type="button" id="btn-cancel" class="btn-text">Cancel</button>
            <button type="submit" id="btn-save" class="btn-contained">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
