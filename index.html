<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar App</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header id="app-header">
    <div class="header-nav">
      <button id="btn-prev" aria-label="Previous month">&#8249;</button>
      <h1 id="month-title"></h1>
      <button id="btn-next" aria-label="Next month">&#8250;</button>
    </div>
    <div class="header-actions">
      <button id="btn-today">Today</button>
      <button id="btn-add-event">+ Add Event</button>
    </div>
  </header>

  <main id="calendar-main">
    <div id="calendar-grid"></div>
  </main>

  <div id="event-modal" class="modal-overlay" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 id="modal-title">Add Event</h2>
        <button id="btn-modal-close" aria-label="Close">&times;</button>
      </div>

      <form id="event-form" novalidate>
        <div class="form-group">
          <label for="input-title">Title <span class="required" aria-hidden="true">*</span></label>
          <input id="input-title" type="text" placeholder="Event title" autocomplete="off" />
          <span class="field-error" id="err-title"></span>
        </div>

        <div class="form-group">
          <label for="input-date">Date <span class="required" aria-hidden="true">*</span></label>
          <input id="input-date" type="date" />
          <span class="field-error" id="err-date"></span>
        </div>

        <div class="form-group form-group--inline">
          <div>
            <label for="input-start">Start time</label>
            <input id="input-start" type="time" />
          </div>
          <div>
            <label for="input-end">End time</label>
            <input id="input-end" type="time" />
          </div>
        </div>
        <span class="field-error" id="err-time"></span>

        <div class="form-group">
          <label for="input-notes">Notes</label>
          <textarea id="input-notes" rows="3" placeholder="Optional notes"></textarea>
        </div>

        <div class="modal-actions">
          <button type="button" id="btn-delete-event" class="btn-danger" hidden>Delete</button>
          <div class="modal-actions-right">
            <button type="button" id="btn-cancel">Cancel</button>
            <button type="submit" id="btn-save">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
